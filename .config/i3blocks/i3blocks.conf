# Global properties
#
# The top properties below are applied to every block, but can be overridden.
# Each block command defaults to the script name to avoid boilerplate.
#
command=/usr/lib/i3blocks/$BLOCK_NAME
#separator_block_width=25
#markup=none
#separator=W
#color=#d79921
color=#ffffff
separator=false
separator_block_width=30


#[click]
#full_text=Click me!
#command=echo "Got clicked with button $button"
#color=#F79494

[Capslock]
command=~/scripts/capslock-2
interval=once
background=#900000
color=#ffffff
signal=11

[updatable packages]
#command=if [[ -n $(checkupdates) ]]; then echo  $(checkupdates | wc -l); fi
command=$HOME/scripts/update
interval=14400
signal=20

[disk free space]
command=df -h | awk '/sda3/ { print " "$4 }'
interval=30

[cpu temperature]
command=~/scripts/temperature
interval=5

[weather]
command=curl wttr.in/budapest?format="%c+Budapest+%t+%f\n"
interval=3600

[radio]
command=~/scripts/radio1/radio1-status
signal=13
interval=once

[volume]
command=~/scripts/volume
signal=12
interval=once

[battery]
command=~/scripts/battery-capacity
interval=30

[date]
command=date '+ %Y.%m.%d. %a'
interval=60

[time]
command=date '+ %H:%M:%S'
interval=1
